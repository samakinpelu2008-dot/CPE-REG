<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syrix Tech Lab | Home</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#000000">

    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }

        /* LAYER 1: Background Image */
        .background-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('images/IMG-20260626-WA0122.jpg');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        /* LAYER 2: 3D Gun Canvas */
        #webgl-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        /* LAYER 3: UI Overlay */
        .ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px; z-index: 2; pointer-events: none; box-sizing: border-box;
        }
        .ui-overlay * { pointer-events: auto; }

        .top-nav { display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.4); padding: 15px 25px; border-radius: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .currency-bar { display: flex; gap: 20px; font-weight: bold; }
        .action-deck { display: flex; justify-content: center; gap: 30px; margin-bottom: 50px; }
        .mode-btn { padding: 20px 60px; background: rgba(0, 150, 255, 0.3); border: 2px solid #00d4ff; color: white; cursor: pointer; font-weight: bold; border-radius: 10px; backdrop-filter: blur(5px); display: flex; align-items: center; gap: 10px; font-size: 1.2rem; }
        .bottom-nav { display: flex; justify-content: center; gap: 20px; }
        .nav-btn { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.2); padding: 15px 30px; color: white; cursor: pointer; border-radius: 10px; backdrop-filter: blur(5px); display: flex; align-items: center; gap: 10px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="background-layer"></div>
    <canvas id="webgl-canvas"></canvas>

    <div class="ui-overlay">
        <header class="top-nav">
            <div>👤 PlayerOne | LV 24</div>
            <div class="currency-bar">
                <span>🪙 1,200</span> <span>💎 45</span> <span>🎟️ 10</span>
            </div>
        </header>

        <main class="action-deck">
            <button class="mode-btn"><i data-lucide="play"></i> 1 v 1</button>
            <button class="mode-btn"><i data-lucide="trending-up"></i> LV MODE</button>
        </main>

        <footer class="bottom-nav">
            <button class="nav-btn"><i data-lucide="shopping-cart"></i> STORE</button>
            <button class="nav-btn"><i data-lucide="crosshair"></i> WEAPONS</button>
            <button class="nav-btn"><i data-lucide="user"></i> CHARACTERS</button>
            <button class="nav-btn"><i data-lucide="settings"></i> SETTINGS</button>
        </footer>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Register Service Worker for PWA functionality
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service Worker registered!'))
                    .catch(err => console.log('Service Worker failed:', err));
            });
        }
    </script>
</body>
</html>
